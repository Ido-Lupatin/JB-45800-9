<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles | VBR Landscaping Insights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Base Reset & Core UX Configurations */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #fcfdfc; color: #1e291e; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        /* Hero Banner Design System */
        .hero-banner { background-color: #0c2312; color: #ffffff; padding: 100px 20px; text-align: center; }
        .hero-banner h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 3.6rem; margin-bottom: 20px; }
        .hero-subtitle { font-size: 1.15rem; font-weight: 300; max-width: 640px; margin: 0 auto; opacity: 0.85; line-height: 1.6; }
        
        /* תיקון התאריך */
        .hero-date { margin-top: 25px; font-size: 0.9rem; font-weight: 600; color: #64b46c; letter-spacing: 1.5px; text-transform: uppercase; }

        /* Structural Grid System */
        .main-container { max-width: 1140px; margin: 0 auto; padding: 60px 20px; }
        .divider-line { border: 0; height: 1px; background-color: #e2e8f0; width: 100%; margin: 60px 0; }

        /* Slider Wrapper System */
        .articles-slider-container { position: relative; width: 100%; overflow: hidden; margin-bottom: 30px; }
        .articles-stack { display: flex; width: 200%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .main-article { width: 50%; flex-shrink: 0; display: flex; gap: 60px; padding: 10px; }
        .article-img-wrapper { flex: 1.2; position: relative; min-width: 350px; }
        .article-img { width: 100%; height: 400px; object-fit: cover; border-radius: 24px; display: block; }
        .badge { position: absolute; top: 24px; left: 24px; background: #ffffff; color: #0c2312; font-size: 0.75rem; font-weight: 700; padding: 6px 16px; border-radius: 20px; text-transform: uppercase; }
        .article-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .article-date { color: #64b46c; font-size: 0.85rem; font-weight: 700; display: block; margin-bottom: 12px; }
        .article-content h3 { font-family: 'Playfair Display', Georgia, serif; font-size: 2.5rem; margin-bottom: 18px; }
        .slider-read-more { font-weight: 700; color: #0c2312; text-decoration: none; margin-top: 20px; }

        /* Slider Navigation */
        .slider-navigation { display: flex; justify-content: center; gap: 12px; margin-top: 24px; margin-bottom: 40px; }
        .navigation-dot { width: 12px; height: 12px; border-radius: 50%; background-color: #cbd5e0; border: none; cursor: pointer; }
        .navigation-dot.active { background-color: #0c2312; }

        /* Trending Section */
        .trending-section { display: flex; gap: 80px; margin: 0 0 90px 0; }
        .trending-item { display: flex; gap: 30px; padding: 24px 0; border-top: 1px solid #edf2f7; }
        .trending-num { color: #e2e8f0; font-size: 2.8rem; font-weight: 700; min-width: 60px; }

        /* Cards Grid */
        .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .card-item { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 20px; overflow: hidden; }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 24px; }
        
        .site-footer { background-color: #061309; color: rgba(255,255,255,0.7); padding: 50px 20px; text-align: center; }

        @media (max-width: 900px) {
            .articles-stack { flex-direction: column; width: 100%; }
            .main-article { width: 100%; flex-direction: column; }
            .cards-grid { grid-template-columns: 1fr; }
            .trending-section { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header class="hero-banner">
        <h1>Articles</h1>
        <h2 class="hero-subtitle">
            In-depth analysis, expert advice, and experimental research from the area's largest landscape team.
        </h2>
        <div class="hero-date">Jun 28, 2026</div>
    </header>

    <main class="main-container">
        <div class="articles-slider-container">
            <div class="articles-stack" id="sliderTrack">
                <article class="main-article">
                    <div class="article-img-wrapper">
                        <img src="01.jpeg" alt="Soil" class="article-img">
                        <span class="badge">Featured</span>
                    </div>
                    <div class="article-content">
                        <span class="article-date">OCT 24, 2026</span>
                        <h3>The Comprehensive Science of Soil Conditioning</h3>
                        <p>Maximizing plant vitality starts beneath the surface.</p>
                    </div>
                </article>
            </div>
        </div>
        </main>

    <footer class="site-footer">
        <p>Copyright &copy; 2026 VBR Inspired Landscapes.</p>
    </footer>

    <script>
        let currentSlide = 0;
        const totalSlides = 2;
        let autoPlayTimer = setInterval(nextSlide, 10000);
        function updateSliderPosition(slideIndex) {
            const track = document.getElementById('sliderTrack');
            track.style.transform = `translateX(-${slideIndex * 50}%)`;
            currentSlide = slideIndex;
        }
        function nextSlide() { updateSliderPosition((currentSlide + 1) % totalSlides); }
        function manualSlideChange(slideIndex) { clearInterval(autoPlayTimer); updateSliderPosition(slideIndex); }
    </script>
</body>
</html>
